<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="description" content="Kids Alphabet Learning - Fun learning for kids">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kids Alphabet Learning</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --abc-nav-h: 84px;
      --abc-controls-gap: calc(var(--abc-nav-h) + 18px);
      --abc-controls-bottom: max(clamp(8px, 1.5vh, 16px), var(--abc-controls-gap));
    }

    html, body {
      font-family: 'Comic Sans MS', 'Chalkboard SE', cursive;
      background: linear-gradient(180deg, #5bbfee 0%, #9ed8f5 38%, #cff2a0 68%, #7ec850 100%);
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    /* ══ BACK BTN ══ */
    .back-btn {
      position:fixed; top:25px; left:12px; z-index:300;
      display:flex; align-items:center; gap:6px;
      background:#a5430a; color:#fff;
      border:none; border-radius:50px; padding:8px 16px;
      font-family:'Fredoka One',cursive; font-size:14px;
      cursor:pointer; text-decoration:none;
      box-shadow:0 4px #5a2004, 0 0 14px rgba(255,100,0,.2);
      transition:all .15s;
    }
    .back-btn:hover{background:#c4530d;}
    .back-btn:active{transform:translateY(3px); box-shadow:0 1px #5a2004;}

    /* ══ REALISTIC SUN ══ */
    .sun-wrap {
      position: fixed;
      top: clamp(10px, 2.5vw, 24px);
      right: clamp(12px, 3vw, 40px);
      z-index: 5;
      width: clamp(44px, 7vw, 92px);
      height: clamp(44px, 7vw, 92px);
    }
    .sun-halo {
      position: absolute; inset: -40%; border-radius: 50%;
      background: radial-gradient(circle,
        rgba(255,230,50,.55) 0%, rgba(255,200,0,.28) 38%,
        rgba(255,160,0,.10) 62%, transparent 80%);
      animation: haloBreath 4s ease-in-out infinite;
    }
    @keyframes haloBreath {
      0%,100%{ transform:scale(1);   opacity:.85; }
      50%    { transform:scale(1.1); opacity:1;   }
    }
    .sun-rays {
      position: absolute; inset: -28%; border-radius: 50%;
      animation: raysSpin 18s linear infinite;
    }
    .sun-rays::before {
      content:''; position:absolute; inset:0; border-radius:50%;
      background: repeating-conic-gradient(rgba(255,220,30,.55) 0deg 10deg, transparent 10deg 30deg);
      mask: radial-gradient(circle, transparent 42%, black 56%, black 100%);
      -webkit-mask: radial-gradient(circle, transparent 42%, black 56%, black 100%);
    }
    @keyframes raysSpin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    .sun-disc {
      position:absolute; inset:0; border-radius:50%;
      background: radial-gradient(circle at 38% 35%, #fff9c4 0%, #ffe033 28%, #ffc107 58%, #ff8f00 85%, #e65100 100%);
      box-shadow: 0 0 18px 4px rgba(255,220,0,.7), 0 0 48px 12px rgba(255,160,0,.4), 0 0 80px 24px rgba(255,100,0,.15);
      animation: discPulse 3s ease-in-out infinite;
    }
    @keyframes discPulse {
      0%,100%{ transform:scale(1);    box-shadow:0 0 18px 4px rgba(255,220,0,.7),0 0 48px 12px rgba(255,160,0,.4); }
      50%    { transform:scale(1.05); box-shadow:0 0 26px 8px rgba(255,235,0,.9),0 0 64px 20px rgba(255,180,0,.55); }
    }
    .sun-disc::before {
      content:''; position:absolute; top:14%; left:18%; width:34%; height:26%;
      border-radius:50%;
      background: radial-gradient(circle, rgba(255,255,255,.72) 0%, transparent 100%);
    }

    /* ══ CLOUDS ══ */
    .cloud {
      position:fixed; border-radius:50px;
      background:rgba(255,255,255,.92);
      animation:cloudDrift linear infinite;
      z-index:1; pointer-events:none;
    }
    .cloud::before,.cloud::after {
      content:''; position:absolute;
      background:rgba(255,255,255,.92); border-radius:50%;
    }
    .cl1{width:120px;height:38px;top:7%; animation-duration:34s;animation-delay:0s;}
    .cl1::before{width:58px;height:58px;top:-30px;left:14px;}
    .cl1::after {width:44px;height:44px;top:-20px;left:54px;}
    .cl2{width:90px; height:28px;top:18%;animation-duration:25s;animation-delay:-10s;}
    .cl2::before{width:44px;height:44px;top:-24px;left:10px;}
    .cl2::after {width:34px;height:34px;top:-16px;left:40px;}
    .cl3{width:150px;height:44px;top:4%; animation-duration:42s;animation-delay:-20s;}
    .cl3::before{width:70px;height:70px;top:-38px;left:20px;}
    .cl3::after {width:54px;height:54px;top:-25px;left:66px;}
    .cl4{width:74px; height:24px;top:28%;animation-duration:28s;animation-delay:-7s;}
    .cl4::before{width:34px;height:34px;top:-18px;left:8px;}
    .cl4::after {width:26px;height:26px;top:-12px;left:32px;}
    @keyframes cloudDrift{from{transform:translateX(-260px)}to{transform:translateX(110vw)}}

    /* ══ TITLE ══ */
    #title {
      position: fixed;
      top: clamp(8px, 1.8vh, 18px);
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(15px, 3.8vw, 48px);
      color: #fff;
      text-shadow: 3px 3px 0 #bf360c,-1px -1px 0 #bf360c,
                   1px -1px 0 #bf360c,-1px 1px 0 #bf360c;
      white-space: nowrap;
      animation: titleBounce 1s ease-in-out infinite alternate;
      z-index: 30;
      max-width: calc(100vw - clamp(80px,18vw,180px));
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    @keyframes titleBounce {
      from{ transform:translateX(-50%) translateY(0); }
      to  { transform:translateX(-50%) translateY(-6px); }
    }

    /* ══ GROUND ══ */
    .ground {
      position: fixed; bottom: 0; left: 0; width: 100%;
      height: var(--ground-h, clamp(55px, 14vh, 140px));
      background: linear-gradient(180deg, #7ec850, #4e9b22);
      z-index: 1;
    }
    .ground::before {
      content:''; position:absolute; top:0; left:0;
      width:100%; height:12px; background:#6abe3a;
    }



    /* ══ TREES ══ */
    .tree {
      position: fixed; z-index: 2;
      bottom: var(--ground-h, clamp(55px, 14vh, 140px));
    }
    @media (max-width: 480px) {
      .tree-hide-sm { display: none; }
    }

    /* ══ SCHOOL BUILDING ══ */
    .school-wrap {
      position: fixed;
      z-index: 2;
      bottom: var(--ground-h, clamp(55px, 14vh, 140px));
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }

    /* ══ CHILDREN ══ */
    .children-wrap {
      position: fixed;
      z-index: 4;
      bottom: var(--ground-h, clamp(55px, 14vh, 140px));
      left: 0;
      width: 100%;
      pointer-events: none;
    }
    .children-wrap svg {
      width: 100%;
      display: block;
    }

    /* ══ CHILD ANIMATIONS ══ */
    @keyframes kidSkip {
      0%,100%{ transform: translateY(0); }
      45%    { transform: translateY(-11px); }
    }
    @keyframes kidJump {
      0%,100%{ transform: translateY(0); }
      40%    { transform: translateY(-13px); }
    }
    @keyframes kidBounce {
      0%,100%{ transform: translateY(0) scaleY(1); }
      40%    { transform: translateY(-8px) scaleY(1.04); }
    }
    @keyframes ballBounce {
      0%,100%{ transform: translateY(0); }
      40%    { transform: translateY(-10px); }
    }
    @keyframes kiteFloat {
      0%,100%{ transform: translateY(0) rotate(-3deg); }
      50%    { transform: translateY(-6px) rotate(3deg); }
    }
    @keyframes ropeSwing {
      0%,100%{ d: path("M38,60 Q60,80 82,60"); }
      50%    { d: path("M38,70 Q60,58 82,70"); }
    }

    .menu-buttons {
      position: fixed;
      top: 90%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      gap: 20px;
      z-index: 100;
    }

    .menu-btn {
      background: #ff9800;
      color: #fff;
      padding: 14px 22px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: bold;
      text-decoration: none;
      box-shadow: 0 5px #e65100;
      transition: all 0.2s;
    }

    .menu-btn:hover  { background: #ffa726; }
    .menu-btn:active { transform: translateY(4px); box-shadow: 0 2px #e65100; }

    /* ══ BOTTOM NAV ══ */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;min-height:var(--abc-nav-h);background:rgba(255,255,255,.96);display:flex;align-items:stretch;box-shadow:0 -4px 24px rgba(0,0,0,.10);border-radius:20px 20px 0 0;z-index:500;padding:8px 8px calc(8px + env(safe-area-inset-bottom,0px));backdrop-filter:blur(8px);}
    .ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:none;background:none;gap:3px;transition:all .2s;border-radius:14px;margin:0 2px;min-width:0;padding:8px 4px;}
    .ni .ico{font-size:24px;transition:transform .2s;}
    .ni .lbl{font-size:10px;font-weight:800;color:#6a8f6a;text-align:center;line-height:1.2;}
    .ni.active .ico{transform:scale(1.22);}
    .ni.active .lbl{color:#1b5e20;}
    .ni.active{background:#f1f8e9;}

    @media (max-width: 480px) {
      :root {
        --abc-nav-h: 88px;
        --abc-controls-gap: calc(var(--abc-nav-h) + 12px);
        --abc-controls-bottom: 46vh;
      }
      .controls{ gap:6px; padding:0 6px; }
      .controls button{ padding:8px 12px; font-size:12px; border-radius:12px; }
      .control-stack{ gap:6px; }
      .bottom-nav{min-height:var(--abc-nav-h);padding:6px 6px calc(10px + env(safe-area-inset-bottom,0px));}
      .ni .ico{font-size:22px;}
      .ni .lbl{font-size:9px;}
    }
    @media (max-width: 380px) {
      :root {
        --abc-nav-h: 92px;
        --abc-controls-gap: calc(var(--abc-nav-h) + 10px);
        --abc-controls-bottom: 44vh;
      }
      .controls{ gap:5px; }
      .controls button{ padding:7px 10px; font-size:11px; }
    }
    @media (min-width: 481px) and (max-width: 1024px) {
      :root { --abc-controls-bottom: 40vh; }
      .controls{ gap:8px; padding:0 12px; }
      .controls button{ padding:10px 16px; font-size:13px; }
    }

    @media (max-width: 640px) {
      .back-btn {
        top: 10px;
        left: 10px;
        padding: 8px 12px;
        font-size: 12px;
      }

      .sun-wrap {
        top: 10px;
        right: 10px;
      }

      #title {
        top: 12px;
        max-width: calc(100vw - 120px);
      }

      .menu-buttons {
        top: 462px;
        width: min(92vw, 360px);
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
      }

      .menu-btn {
        flex: 1 1 140px;
        text-align: center;
        padding: 12px 14px;
        font-size: 12px;
      }
    }

    @media (max-width: 380px) {
      .menu-buttons {
        width: 94vw;
      }

      .menu-btn {
        flex-basis: 100%;
      }
    }
  </style>
</head>
<body>

<!-- ══ BACK BUTTON ══ -->
<a class="back-btn" href="app.html">← Back</a>

<!-- Realistic Sun -->
<div class="sun-wrap">
  <div class="sun-halo"></div>
  <div class="sun-rays"></div>
  <div class="sun-disc"></div>
</div>

<div class="cloud cl1"></div>
<div class="cloud cl2"></div>
<div class="cloud cl3"></div>
<div class="cloud cl4"></div>

<div class="ground"></div>

<!-- Trees — some hidden on mobile -->
<div class="tree" style="left:2%">
  <svg id="t1" viewBox="0 0 36 62"><rect x="14" y="40" width="8" height="22" fill="#7a4f28"/><polygon points="18,0 0,24 7,24 0,42 11,42 11,52 25,52 25,42 36,42 29,24 36,24" fill="#3a8f2a"/></svg>
</div>
<div class="tree" style="right:3%">
  <svg id="t2" viewBox="0 0 44 76"><rect x="18" y="50" width="8" height="26" fill="#8B5E3C"/><polygon points="22,0 1,32 9,32 0,52 14,52 14,64 30,64 30,52 44,52 35,32 43,32" fill="#2e7d22"/></svg>
</div>
<div class="tree tree-hide-sm" style="left:15%">
  <svg id="t3" viewBox="0 0 30 54"><rect x="11" y="36" width="8" height="18" fill="#7a4f28"/><polygon points="15,0 0,22 6,22 0,38 10,38 10,46 20,46 20,38 30,38 24,22 30,22" fill="#4a9e30"/></svg>
</div>
<div class="tree tree-hide-sm" style="right:19%">
  <svg id="t4" viewBox="0 0 34 60"><rect x="13" y="39" width="8" height="21" fill="#7a4f28"/><polygon points="17,0 0,25 7,25 0,42 10,42 10,52 24,52 24,42 34,42 27,25 34,25" fill="#38862a"/></svg>
</div>

<!-- ══ SCHOOL BUILDING ══ -->
<div class="school-wrap" id="schoolWrap">
  <svg id="schoolSvg" viewBox="0 0 300 195" xmlns="http://www.w3.org/2000/svg">
    <!-- Flag pole -->
    <line x1="252" y1="12"  x2="252" y2="90" stroke="#aaa" stroke-width="2"/>
    <polygon points="252,8 274,18 252,28" fill="#FF4444"/>

    <!-- Main building body -->
    <rect x="20" y="75" width="230" height="120" rx="3" fill="#f5e6c8" stroke="#c9a86c" stroke-width="1.5"/>

    <!-- Roof / gable triangle -->
    <polygon points="10,75 135,18 270,75" fill="#e05a2b" stroke="#c04020" stroke-width="1.5"/>

    <!-- Chimney -->
    <rect x="205" y="22" width="16" height="32" rx="2" fill="#c9a86c" stroke="#a07850" stroke-width="1"/>
    <rect x="203" y="20" width="20" height="5" rx="1" fill="#b89058"/>

    <!-- Decorative brick lines -->
    <line x1="20" y1="105" x2="250" y2="105" stroke="#c9a86c" stroke-width="0.5" stroke-dasharray="5 4" opacity="0.5"/>
    <line x1="20" y1="135" x2="250" y2="135" stroke="#c9a86c" stroke-width="0.5" stroke-dasharray="5 4" opacity="0.5"/>
    <line x1="20" y1="165" x2="250" y2="165" stroke="#c9a86c" stroke-width="0.5" stroke-dasharray="5 4" opacity="0.5"/>

    <!-- Left window -->
    <rect x="38"  y="88"  width="42" height="34" rx="3" fill="#a8d8f5" stroke="#6baadc" stroke-width="1.2"/>
    <line x1="59"  y1="88"  x2="59"  y2="122" stroke="#6baadc" stroke-width="1"/>
    <line x1="38"  y1="105" x2="80"  y2="105" stroke="#6baadc" stroke-width="1"/>

    <!-- Right window -->
    <rect x="200" y="88"  width="42" height="34" rx="3" fill="#a8d8f5" stroke="#6baadc" stroke-width="1.2"/>
    <line x1="221" y1="88"  x2="221" y2="122" stroke="#6baadc" stroke-width="1"/>
    <line x1="200" y1="105" x2="242" y2="105" stroke="#6baadc" stroke-width="1"/>

    <!-- Gable round window -->
    <ellipse cx="135" cy="44" rx="16" ry="13" fill="#a8d8f5" stroke="#6baadc" stroke-width="1.2"/>
    <line x1="135" y1="31" x2="135" y2="57" stroke="#6baadc" stroke-width="0.8"/>
    <line x1="119" y1="44" x2="151" y2="44" stroke="#6baadc" stroke-width="0.8"/>

    <!-- Bell at roof peak -->
    <ellipse cx="135" cy="20" rx="6" ry="7" fill="#f0c040" stroke="#b08820" stroke-width="1"/>
    <line x1="135" y1="27" x2="135" y2="32" stroke="#b08820" stroke-width="1.5"/>

    <!-- School sign board -->
    <rect x="92" y="120" width="94" height="16" rx="3" fill="#fffde7" stroke="#f9c240" stroke-width="1.2"/>
    <text x="135" y="130" text-anchor="middle" font-family="'Comic Sans MS',cursive" font-size="8.5" fill="#e65100" font-weight="bold">🏫 Kiddo SCHOOL</tex

    <!-- Door -->
    <rect x="114" y="143" width="42" height="52" rx="3" fill="#8B5E3C" stroke="#5a3a1a" stroke-width="1.2"/>
    <!-- Door window -->
    <rect x="121" y="148" width="12" height="12" rx="2" fill="#a8d8f5" opacity="0.7"/>
    <rect x="137" y="148" width="12" height="12" rx="2" fill="#a8d8f5" opacity="0.7"/>
    <!-- Door knob -->
    <circle cx="153" cy="173" r="2" fill="#f0c040"/>

    <!-- Steps -->
    <rect x="108" y="191" width="54" height="4" rx="1" fill="#d4b896" stroke="#c9a86c" stroke-width="1"/>

    <!-- Left fence section -->
    <line x1="3"  y1="168" x2="3"  y2="195" stroke="#c9a86c" stroke-width="2"/>
    <line x1="11" y1="168" x2="11" y2="195" stroke="#c9a86c" stroke-width="2"/>
    <line x1="19" y1="168" x2="19" y2="195" stroke="#c9a86c" stroke-width="2"/>
    <line x1="1"  y1="176" x2="21" y2="176" stroke="#c9a86c" stroke-width="1.2"/>

    <!-- Right fence section -->
    <line x1="251" y1="168" x2="251" y2="195" stroke="#c9a86c" stroke-width="2"/>
    <line x1="259" y1="168" x2="259" y2="195" stroke="#c9a86c" stroke-width="2"/>
    <line x1="267" y1="168" x2="267" y2="195" stroke="#c9a86c" stroke-width="2"/>
    <line x1="249" y1="176" x2="269" y2="176" stroke="#c9a86c" stroke-width="1.2"/>
  </svg>
</div>

<!-- ══ PLAYING CHILDREN ══ -->
<div class="children-wrap" id="childrenWrap">
  <svg id="kidsSvg" viewBox="0 0 1000 130" preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg" style="height:130px">

    <!-- ── CHILD 1: Skipping rope (left side, pink dress) ── -->
    <g style="animation:kidSkip 0.72s ease-in-out infinite" transform-origin="75px 118px">
      <!-- dress/body -->
      <ellipse cx="75" cy="97" rx="11" ry="14" fill="#FF8FAB"/>
      <!-- head -->
      <circle cx="75" cy="75" r="12" fill="#FFDAA0"/>
      <!-- hair -->
      <ellipse cx="75" cy="66" rx="12" ry="6" fill="#7B3F00"/>
      <ellipse cx="65" cy="73" rx="5" ry="9" fill="#7B3F00"/>
      <ellipse cx="85" cy="73" rx="5" ry="9" fill="#7B3F00"/>
      <!-- eyes -->
      <circle cx="71" cy="74" r="1.8" fill="#333"/>
      <circle cx="79" cy="74" r="1.8" fill="#333"/>
      <!-- smile -->
      <path d="M71 81 Q75 85 79 81" fill="none" stroke="#c06060" stroke-width="1.3"/>
      <!-- arms raised -->
      <line x1="64" y1="95" x2="50" y2="82" stroke="#FFDAA0" stroke-width="4.5" stroke-linecap="round"/>
      <line x1="86" y1="95" x2="100" y2="82" stroke="#FFDAA0" stroke-width="4.5" stroke-linecap="round"/>
      <!-- legs apart -->
      <line x1="70" y1="111" x2="60" y2="127" stroke="#FFDAA0" stroke-width="4.5" stroke-linecap="round"/>
      <line x1="80" y1="111" x2="90" y2="125" stroke="#FFDAA0" stroke-width="4.5" stroke-linecap="round"/>
      <!-- shoes -->
      <ellipse cx="60" cy="128" rx="6" ry="3" fill="#e05a2b"/>
      <ellipse cx="90" cy="126" rx="6" ry="3" fill="#e05a2b"/>
      <!-- skip rope -->
      <path d="M50,82 Q75,104 100,82" fill="none" stroke="#f9c240" stroke-width="2" stroke-dasharray="3 2" opacity="0.85"/>
    </g>

    <!-- ── CHILD 2: Jumping with ball (left-center, blue shirt) ── -->
    <g style="animation:kidJump 0.9s ease-in-out infinite 0.15s" transform-origin="210px 118px">
      <!-- body -->
      <ellipse cx="210" cy="96" rx="11" ry="13" fill="#4FC3F7"/>
      <!-- head -->
      <circle cx="210" cy="74" r="12" fill="#FFB347"/>
      <!-- curly hair -->
      <ellipse cx="210" cy="65" rx="12" ry="5" fill="#2c1a00"/>
      <circle cx="202" cy="67" r="4.5" fill="#2c1a00"/>
      <circle cx="210" cy="64" r="4.5" fill="#2c1a00"/>
      <circle cx="218" cy="67" r="4.5" fill="#2c1a00"/>
      <!-- eyes -->
      <circle cx="206" cy="74" r="2" fill="#333"/>
      <circle cx="214" cy="74" r="2" fill="#333"/>
      <!-- smile -->
      <path d="M206 80 Q210 85 214 80" fill="none" stroke="#c06020" stroke-width="1.3"/>
      <!-- arms out -->
      <line x1="199" y1="94" x2="183" y2="103" stroke="#FFB347" stroke-width="4.5" stroke-linecap="round"/>
      <line x1="221" y1="94" x2="237" y2="103" stroke="#FFB347" stroke-width="4.5" stroke-linecap="round"/>
      <!-- shorts -->
      <rect x="201" y="108" width="18" height="11" rx="2" fill="#1565C0"/>
      <!-- legs -->
      <line x1="205" y1="119" x2="196" y2="127" stroke="#FFB347" stroke-width="4.5" stroke-linecap="round"/>
      <line x1="215" y1="119" x2="224" y2="127" stroke="#FFB347" stroke-width="4.5" stroke-linecap="round"/>
      <!-- shoes -->
      <ellipse cx="196" cy="128" rx="6" ry="3" fill="#444"/>
      <ellipse cx="224" cy="128" rx="6" ry="3" fill="#444"/>
    </g>
    <!-- bouncing ball -->
    <circle style="animation:ballBounce 0.9s ease-in-out infinite 0.15s" cx="244" cy="120" r="10" fill="#FF4444" stroke="#cc2222" stroke-width="1.5" transform-origin="244px 120px"/>

    <!-- ── CHILD 3: Arms-wide running (right-center, green shirt) ── -->
    <g style="animation:kidSkip 0.65s ease-in-out infinite 0.35s" transform-origin="620px 118px">
      <!-- body -->
      <ellipse cx="620" cy="96" rx="11" ry="13" fill="#66BB6A"/>
      <!-- head -->

<script>
let index = 0, autoTimer = null;

function getGroundH() {
  const el = document.querySelector('.ground');
  return el ? el.getBoundingClientRect().height : Math.min(window.innerHeight * 0.16, 140);
}

function getSizes() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const groundH  = getGroundH();
  const trackH   = 24;
  const trainZone = vh - groundH - trackH;

  let sideH = Math.min(Math.max(trainZone * 0.32, 60), 200);
  let sideW = Math.round(sideH * 1.45);
  let midH  = Math.round(sideH * 1.7);
  let midW  = Math.round(midH  * 1.45);

  const engScale = vw < 400 ? 1.02 : vw < 768 ? 1.08 : vw < 1025 ? 1.14 : 1.2;
  let engW  = Math.round(sideW * engScale);
  let engH  = Math.round(engW  * 0.72);

  const overlap = vw < 480 ? 0 : vw < 1025 ? 2 : 4;
  const totalTrainW = engW + sideW + midW + sideW - (overlap * 2);
  const maxTrainW = Math.max(vw - (vw < 480 ? 16 : vw < 1025 ? 28 : 40), 260);
  if (totalTrainW > maxTrainW) {
    const fit = maxTrainW / totalTrainW;
    sideW = Math.round(sideW * fit);
    sideH = Math.round(sideH * fit);
    midW  = Math.round(midW  * fit);
    midH  = Math.round(midH  * fit);
    engW  = Math.round(engW  * fit);
    engH  = Math.round(engH  * fit);
  }

  const treeScale = Math.min(Math.max(vw / 1200, 0.45), 1);
  return { sideW, sideH, midW, midH, engW, engH, treeScale, overlap };
}

function scaleTrees(s) {
  const sizes = [
    {id:'t1', bw:36, bh:62},
    {id:'t2', bw:44, bh:76},
    {id:'t3', bw:30, bh:54},
    {id:'t4', bw:34, bh:60},
  ];
  sizes.forEach(t => {
    const el = document.getElementById(t.id);
    if (!el) return;
    el.setAttribute('width',  Math.round(t.bw * s.treeScale));
    el.setAttribute('height', Math.round(t.bh * s.treeScale));
  });
}

function resizeScene() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const groundH = getGroundH();

  // Scale school building responsively
  const schoolSvg  = document.getElementById('schoolSvg');
  const schoolWrap = document.getElementById('schoolWrap');
  if (schoolSvg && schoolWrap) {
    // Target: ~30% of viewport width, capped at 320px, min 160px
    const maxW = Math.min(Math.max(vw * 0.30, 160), 320);
    const maxH = maxW * (195 / 300);
    schoolSvg.style.width  = maxW + 'px';
    schoolSvg.style.height = maxH + 'px';
    // Nudge bottom so building sits on the ground (above track)
    schoolWrap.style.bottom = (groundH + 22) + 'px';
  }

  // Scale children SVG height relative to ground band
  const kidsSvg = document.getElementById('kidsSvg');
  if (kidsSvg) {
    const kh = Math.min(Math.max(groundH * 0.95, 80), 140);
    kidsSvg.style.height = kh + 'px';
  }

  // Also run original tree scaling
  const s = getSizes();
  scaleTrees(s);
}

window.addEventListener('resize', resizeScene);
resizeScene();
</script>
